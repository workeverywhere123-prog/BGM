            - generic [ref=e578]:
              - text: "디셉션: 홍콩 살인사건(Deception: Murder in Hong Kong)은 4~12명이 즐길 수 있는 추리와 속임수 게임으로, 플레이 시간은 약 20분입니다."
              - text: 이 게임에서 플레이어는 살인 사건을 해결하려는 수사관 역할을 맡게 됩니다. 하지만 반전이 있습니다. 살인범이 바로 수사관 중 한 명인 것입니다! 각 플레이어의 역할과 팀은 게임 시작 시 무작위로 배정되며, 법의학자, 목격자, 수사관, 살인범, 공범 등 다양한 역할을 맡게 됩니다. 수사관들이 진실을 밝히려고 노력하는 동안, 살인범 팀은 속임수와 기만술을 동원해야 합니다. 이것은 두뇌 싸움입니다!
              - text: 법의학자는 사건의 해답을 알고 있지만, 특수한 장면 타일을 통해서만 단서를 제시할 수 있습니다. 수사관들(그리고 살인범)은 제시된 증거를 해석해야 합니다. 성공하려면 수사관들은 법의학자가 제공하는 단서에서 진실을 추론해야 할 뿐만 아니라, 살인범과 공범이 심어놓은 속임수도 간파해야 합니다!
              - text: 여러분 중 누가 속임수를 꿰뚫어 진실을 찾아낼 수 있는지, 누가 살인을 저지르고도 처벌받지 않을 수 있는지 알아보세요!
              - text: 역할
              - text: "- 법의학자 1명"
              - text: 게임 진행자인 법의학자는 범죄 해결의 열쇠를 쥐고 있습니다. 법의학자는 수사관들이 "핵심 증거"와 "살인 수단"을 밝혀낼 수 있도록 도와야 합니다. 수사관이 이를 성공적으로 수행하면 범죄가 해결되고, 법의학자와 수사관들은 게임에서 승리합니다.
              - text: 게임 도중, 법의학자는 말, 몸짓, 눈빛으로 해결책을 암시해서는 안 됩니다.
              - text: "- 살인자 1명."
              - text: 범죄가 발생하면 살인자는 단서 카드 1장과 범행 수단 카드 1장을 선택하여 범죄 해결에 활용합니다. 이 카드들은 각각 "핵심 증거"와 "살인 수단"이 됩니다.
              - text: 살인자는 자신의 역할을 숨기고 희생양을 찾으려 한다. 설령 범인이 밝혀지더라도, '핵심 증거'와 '살인 수단'을 모두 정확하게 밝혀내는 사람이 없다면 살인자는 여전히 승리한다.
              - text: "- 수사관 8명."
              - text: 범죄를 해결하기 위해 수사관들은 법의학자가 제공하는 단서를 분석해야 합니다. 수사관 중 한 명이라도 "핵심 증거"와 "살인 수단"을 모두 정확하게 알아내면 살인범이 체포되고 수사관들은 (법의학자도 마찬가지로) 게임에서 승리합니다.
              - text: 살인자(그리고 때로는 공범)가 수사관 중에 있을 수 있다는 점을 명심하십시오! 무고한 수사관들은 허위 고발로부터 자신을 변호하기 위해 강력한 노력을 기울여야 합니다.
              - text: "- 공범 1명."
              - text: 공범은 플레이어가 6명 이상인 게임에서 선택적으로 사용할 수 있는 역할입니다. 공범은 살인자가 누구인지, 그리고 범죄 해결 방법이 무엇인지 알고 있습니다. 살인자가 범죄를 저지르고도 처벌을 받지 않으면 공범과 살인자 모두 승리합니다.
              - text: "- 목격자 1명."
              - text: 목격자는 플레이어가 6명 이상일 때 선택적으로 참여할 수 있는 역할입니다.* 목격자는 범인들이 범죄 현장을 떠나는 것을 목격한 수사관입니다. 누가 살인자이고 누가 공범인지, 그리고 범행이 어떻게 저질러졌는지 알 수 없습니다.
              - text: 살인범이 체포되었지만 목격자를 식별할 수 있다면, 목격자는 사망한 것으로 간주되어 살인범과 공범은 살인죄를 저지르고도 게임에서 승리할 수 있습니다.
