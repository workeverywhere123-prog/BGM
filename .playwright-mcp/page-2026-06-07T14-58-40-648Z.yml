            - generic [ref=e583]:
              - text: 1. 게임 개요
              - text: 딕싯(Dixit)은 감성과 상상력을 기반으로 한 카드 기반의 보드게임입니다. 플레이어는 추상적인 일러스트가 그려진 카드에 짧은 문장을 붙여 서로의 감정을 나누고, 그 안에서 추리를 통해 점수를 얻습니다. 직접적인 경쟁보다는 감정 표현과 유추의 즐거움에 초점을 맞춘 독특한 게임으로, 전 세계적으로 많은 사랑을 받고 있습니다.
              - text: 이 게임은 언어의 장벽을 넘어서며, 가족, 친구, 연인 등 다양한 관계 속에서 소통과 공감을 유도하기에 최적화된 구조를 갖고 있습니다. 예술적이고 모호한 그림들은 플레이어가 자신만의 방식으로 해석할 수 있어, 같은 카드를 보고도 전혀 다른 생각이 나올 수 있습니다. 이러한 점이 딕싯을 단순한 게임을 넘어 감정 교류의 도구로 만들어 줍니다.
              - text: 2. 게임 구성물
              - text: ㆍ일러스트가 그려진 대형 카드들 (84장 기본)
              - text: ㆍ점수 표시를 위한 개인 말과 점수 트랙
              - text: ㆍ각 플레이어가 사용하는 투표 토큰 (1~6)
              - text: ㆍ게임 보드(토끼 모양 말이 이동하는 형태)
              - text: ㆍ규칙서
              - text: 3. 게임 목표
              - text: 각 플레이어는 스토리텔러가 되었을 때 적절히 모호한 힌트를 제공하고, 나머지 플레이어는 그 힌트를 기반으로 카드를 추리하여 맞히는 것을 목표로 합니다. 정확하게도, 너무 명확하거나 너무 모호하면 안 됩니다. 적절한 모호함을 유지한 스토리텔러가 더 많은 점수를 얻게 되며, 다른 플레이어들도 서로의 카드를 잘 맞힐수록 점수를 얻습니다.
              - text: 4. 게임 진행 방식
              - text: "딕싯은 아래와 같은 단계별 순서로 진행됩니다:"
              - text: ㆍ각 플레이어는 손에 카드 6장을 가지고 시작합니다.
              - text: ① 스토리텔러 선정
              - text: ㆍ턴이 시작되면 한 명이 스토리텔러가 됩니다.
              - text: ㆍ스토리텔러는 자신의 손에서 한 장의 카드를 선택하고, 그 카드에 어울리는 간단한 문장, 단어, 소리 등을 만들어 말합니다.
              - text: "예: “추억”, “끝없는 기다림”, “찰나의 순간”"
              - text: ② 카드 제출
              - text: ㆍ다른 플레이어들은 각자 그 힌트에 가장 적합하다고 생각하는 자신의 카드 1장을 선택하여 뒷면으로 제출합니다.
              - text: ㆍ모든 카드는 섞어서 무작위로 공개됩니다.
              - text: ③ 카드 공개 및 투표
              - text: ㆍ제출된 모든 카드를 무작위로 섞은 후 앞면으로 펼쳐놓습니다.
              - text: ㆍ스토리텔러를 제외한 플레이어는 가장 힌트에 적합하다고 생각되는 카드에 투표 토큰을 올립니다.
              - text: ㆍ자신이 낸 카드에는 투표할 수 없습니다.
              - text: ④ 점수 계산
              - text: ㆍ모든 플레이어가 스토리텔러의 카드를 맞혔다면, 또는 아무도 맞히지 못했다면, 스토리텔러는 0점이고, 다른 플레이어들은 각자 2점을 받습니다.
              - text: ㆍ일부만 맞혔다면, 스토리텔러와 맞힌 플레이어는 각각 3점을 받습니다.
              - text: ㆍ다른 플레이어의 카드에 투표를 받으면, 투표 1개당 1점을 해당 플레이어가 받습니다.
              - text: ⑤ 다음 플레이어로 진행
              - text: ㆍ점수판의 말(토끼)을 움직이며 점수를 반영합니다.
              - text: ㆍ모든 플레이어는 손에 6장이 되도록 다시 카드 보충
              - text: ㆍ다음 플레이어가 스토리텔러가 되어 새로운 라운드를 시작합니다.
              - text: 5. 게임 종료 조건
              - text: ㆍ카드 더미가 바닥나고 손패도 모두 소진되면 게임이 종료됩니다.
              - text: ㆍ가장 많은 점수를 획득한 플레이어가 승리합니다.
              - text: ㆍ점수가 동일할 경우, 공동 승리로 처리합니다.
              - text: 6. 핵심 전략
              - text: "딕싯은 추상적인 그림과 표현력을 이용하는 게임인 만큼, 전통적인 의미의 전략보다는 감성과 상황 판단 능력이 중요합니다. 하지만 아래와 같은 전략적 요소를 고려해볼 수 있습니다:"
              - text: ㆍ스토리텔러일 때는 모두가 맞히지 않도록, 그러나 몇 명은 맞힐 수 있을 정도로 모호한 표현을 선택해야 합니다. 이는 언어적 센스와 상대의 사고방식에 대한 이해가 중요합니다.
              - text: ㆍ추리하는 입장에서는 스토리텔러의 말투, 성격, 취향, 기존 힌트 스타일을 유추하여 어떤 카드가 그 사람의 카드일지 생각해야 합니다.
              - text: ㆍ자신의 카드에 다른 플레이어가 투표하도록 유도하는 카드 선택도 전략의 핵심입니다. 이로 인해 점수를 간접적으로 획득할 수 있습니다.
              - text: 7. 게임의 특징과 매력
              - text: "ㆍ비언어적 상호작용의 재미: 간단한 힌트와 그림만으로도 깊은 감정 전달이 가능해, 언어 능력의 제한 없이 전 세계 어디에서나 즐길 수 있습니다."
              - text: "ㆍ무한한 재플레이성: 같은 카드라도 매번 다른 문장, 다른 분위기로 사용되기 때문에 매 게임마다 전혀 다른 전개가 펼쳐집니다."
              - text: "ㆍ감수성과 창의성 자극: 어린이부터 성인까지 자신의 감정과 상상력을 표현하는 훈련이 됩니다."
              - text: "ㆍ사회적 유대 강화: 친구나 가족끼리 플레이하면 상대방의 생각을 읽고 이해하려는 과정에서 더 깊은 교감과 친밀감이 형성됩니다."
              - text: 8. 추천 플레이 상황
              - text: ㆍ처음 만난 사람들과의 아이스브레이킹
              - text: ㆍ가족 모임, 소셜 파티, 커뮤니케이션 훈련 워크숍
              - text: ㆍ미술 치료, 심리 상담 등 감정 표현이 필요한 현장
              - text: ㆍ아이들의 창의력 훈련 및 언어 감각 교육
              - text: 9. 확장판과 다양한 버전
              - text: 딕싯은 기본판 외에도 다양한 확장 카드 세트가 출시되어 새로운 그림과 분위기를 경험할 수 있습니다. 확장은 보통 84장의 카드로 구성되어 있으며, 기본판에 섞어 사용할 수 있습니다.
              - text: "ㆍ딕싯: 오디세이 \x13 더 많은 인원(최대 12명까지)과 보드 변경"
              - text: "ㆍ딕싯: 미라지, 딕싯: 오리진, 딕싯: 하모니 등 \x13 테마별로 독특한 일러스트 제공"
              - text: 각 확장판은 일러스트레이터가 다르기 때문에 시각적 분위기가 크게 달라지며, 플레이어의 상상력에도 다양한 자극을 줍니다.
              - text: 10. 맺음말
              - text: 딕싯은 단순히 이기는 것보다 서로를 이해하고 표현하는 과정 자체에 의미를 두는 게임입니다. 게임을 통해 웃고, 공감하고, 때로는 예상치 못한 해석에 놀라며 사람 간의 연결고리를 강화하는 것이 이 게임의 진짜 재미입니다. 예술과 상상, 추리가 절묘하게 어우러진 이 게임은 한 번의 플레이만으로도 깊은 인상을 남깁니다.
